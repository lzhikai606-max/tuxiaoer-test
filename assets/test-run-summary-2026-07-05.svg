<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="780" viewBox="0 0 1360 780" role="img" aria-labelledby="title desc">
  <title id="title">图小二 10 组测试结果汇总</title>
  <desc id="desc">2026-07-05 图小二 V0.5 模拟 AI 模式下 10 组测试样例评分结果。</desc>
  <rect width="1360" height="780" fill="#f6f5f0"/>
  <rect x="64" y="56" width="1232" height="668" rx="10" fill="#ffffff" stroke="#dad7cc"/>
  <g font-family="PingFang SC, Microsoft YaHei, Arial, sans-serif">
    <text x="104" y="126" fill="#1f272d" font-size="42" font-weight="700">10 组测试结果：暂不接 AI，先优化 Prompt</text>
    <text x="104" y="164" fill="#65716d" font-size="20">V0.5 模拟 AI 已跑通结构，但生成内容距离“轻度修改后可发布”还有明显差距。</text>

    <rect x="104" y="214" width="300" height="150" rx="8" fill="#f7ece9" stroke="#e2c0b9"/>
    <text x="132" y="270" fill="#7d4036" font-size="52" font-weight="800">0 / 10</text>
    <text x="132" y="314" fill="#765851" font-size="22" font-weight="700">通过样例</text>
    <text x="132" y="342" fill="#765851" font-size="17">未达到 6 组通过门槛</text>

    <rect x="454" y="214" width="300" height="150" rx="8" fill="#fff5de" stroke="#ead091"/>
    <text x="482" y="270" fill="#7a571e" font-size="52" font-weight="800">2.8</text>
    <text x="482" y="314" fill="#746143" font-size="22" font-weight="700">平均评分约值</text>
    <text x="482" y="342" fill="#746143" font-size="17">低于 3.8 通过线</text>

    <rect x="804" y="214" width="300" height="150" rx="8" fill="#eaf4f0" stroke="#bdd8cd"/>
    <text x="832" y="270" fill="#2f7d68" font-size="52" font-weight="800">安全</text>
    <text x="832" y="314" fill="#5e706b" font-size="22" font-weight="700">表现最好</text>
    <text x="832" y="342" fill="#5e706b" font-size="17">未夸大、不焦虑、不承诺结果</text>

    <text x="104" y="438" fill="#1f272d" font-size="30" font-weight="700">主要问题</text>
    <rect x="104" y="476" width="1110" height="160" rx="8" fill="#fbfcfb" stroke="#dadfd6"/>
    <text x="132" y="524" fill="#1f272d" font-size="20" font-weight="700">1. 内容太模板</text>
    <text x="132" y="558" fill="#65716d" font-size="18">反复出现“这样发更像真实分享”“不用太用力”等通用句。</text>
    <text x="132" y="600" fill="#1f272d" font-size="20" font-weight="700">2. 具体度不足</text>
    <text x="132" y="634" fill="#65716d" font-size="18">没有真正展开珍珠耳环、辅食、法式美甲、草莓蛋糕等场景细节。</text>

    <text x="650" y="524" fill="#1f272d" font-size="20" font-weight="700">3. 平台感不强</text>
    <text x="650" y="558" fill="#65716d" font-size="18">小红书不像笔记，抖音口播不够口语，封面标题和选题不成立。</text>
    <text x="650" y="600" fill="#1f272d" font-size="20" font-weight="700">4. 有格式瑕疵</text>
    <text x="650" y="634" fill="#65716d" font-size="18">出现重复句号、直接复述用户输入、账号定位嵌入不自然。</text>

    <rect x="104" y="668" width="1110" height="46" rx="8" fill="#1f272d"/>
    <text x="132" y="697" fill="#ffffff" font-size="20">下一步：先优化 Prompt 和模拟生成逻辑，再重跑 10 组测试；暂不接真实 AI。</text>
  </g>
</svg>
